<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mystyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Togo</title>
</head>
<body>
    <header class="site-init">
        
        <div class="navigation-bar">
            <div>Pizza Shop</div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i>Home</a>
                <a href="menu.html" class="nav-link"><i class="fa-solid fa-book-open"></i>Menu</a>
                <a href="togo.html" class="nav-link"><i class="fa-solid fa-bag-shopping"></i>To Go</a>
            </nav>
    </div>
    </header>
    <main>
        <div class="checkout-page">
            <div class="dish-month-img">
                <img src="pizza.png">
            </div>
            <div class="form-container">
                <form>
                    <fieldset>
                        <legend>Place Your Order</legend>
                        <div class="input-control">
                            <label for="example">Example</label>
                            <input type="text" id="example">
                        </div>
                        
                    <label for="size">Size:</label>
                        <select id="size">
                            <option>Small</option>
                            <option>Medium</option>
                            <option>Large</option>
                        </select><br>
                        <div class="input-control">
                            <label for="price">Price:</label>
                            <input type="number" id="price">
                        </div>
                        <div class="input-control">
                            <label for="quantity">Quantity:</label>
                            <input type="number" id="quantity">
                        </div>
                        <div class="input-control">
                            <label for="description">Description:</label><br>
                            <textarea id="description"  rows="10"></textarea>                        </div>
                        <div class="input-control">
                            <input type="submit" value="Order" >
                        </div>
                    </div>
                </fieldset>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
