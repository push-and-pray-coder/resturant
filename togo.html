<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mystyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Togo</title>
</head>
<body>
    <header class="site-init">
        
        <div class="navigation-bar">
            <div>Pizza Shop</div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i>Home</a>
                <a href="menu.html" class="nav-link"><i class="fa-solid fa-book-open"></i>Menu</a>
                <a href="togo.html" class="nav-link"><i class="fa-solid fa-bag-shopping"></i>To Go</a>
            </nav>
    </div>
    </header>
    <main>
        <div class="checkout-page">
            <div class="dish-month-img">
                <img src="vege.png">
            </div>
            <div  class="field-container">
                <form>
                    
                        <fieldset id="pizza-selction">
                            <legend>Select Your Pizza</legend>
                            <label for="pepperoni"><input type="radio" id="pepperoni" name="pizza-type" value="pepperoni">Pepperoni — $10.00</label>
                            <label for="sausage"><input type="radio" id="sausage" name="pizza-type" value="sausage">Sausage — $9.00</label>
                            <label for="vege"><input type="radio" id="vege" name="pizza-type" value="vege">Vege — $15.00</label>
                        </fieldset>
                        <fieldset><legend>Choose Size</legend>
                            <label for="small"><input type="radio" id="small" name="pizza-size" value="small">Small</label>
                            <label for="medium"><input type="radio" id="medium" name="pizza-size" value="medium">Medium +5$</label>
                            <label for="large"><input type="radio" id="large" name="pizza-size" value="large">Large +$10</label>
                        </fieldset>
                        <div class="input-control">
                            <label for="quantity">Quantity:<br> <input type="number" id="quantity"></label>
                        </div>
                        <div class="input-control">
                            <label for="description">Order Notes:</label><br>
                            <textarea id="description"  rows="10"></textarea>                        
                        </div>
                        <div class="input-control">
                            <input type="submit" value="Order" >
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
